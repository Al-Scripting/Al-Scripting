<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" fill="none">
  <defs>
    <style>
      text { font-family: ui-monospace, "Courier New", monospace; }
      .cur { animation: bl 1s step-end infinite; }
      @keyframes bl { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .l { opacity:0; animation: sh .01s forwards; }
      .a1{animation-delay:.4s}.a2{animation-delay:1.1s}.a3{animation-delay:1.8s}
      .a4{animation-delay:2.5s}.a5{animation-delay:3.2s}.a6{animation-delay:3.9s}.a7{animation-delay:4.6s}
      @keyframes sh { to { opacity:1 } }
      .pg { width:0; animation: bar 1.2s 4.8s ease-out forwards; }
      @keyframes bar { to { width:210px } }
    </style>
    <radialGradient id="glow" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0f1d14"/>
      <stop offset="100%" stop-color="#050807"/>
    </radialGradient>
    <pattern id="sl" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="900" height="420" rx="16" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="899" height="419" rx="15.5" fill="none" stroke="#1f3d29"/>
  <rect x="16" y="16" width="868" height="30" rx="7" fill="#0d1a12"/>
  <circle cx="38" cy="31" r="6" fill="#ff5f56"/>
  <circle cx="58" cy="31" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="31" r="6" fill="#27c93f"/>
  <text x="450" y="35" text-anchor="middle" font-size="12" fill="#5c8f6d">al@oshawa: ~/profile</text>
  <text x="34" y="86" font-size="14" fill="#3fb950" class="l a1">al@oshawa:~$ <tspan fill="#e6f2ea">whoami</tspan></text>
  <text x="34" y="110" font-size="15" fill="#8be0a3" class="l a2">&gt; Al Muqshith Shifan &#8212; breaks networks on purpose, then teaches AI to fix them.</text>
  <text x="34" y="146" font-size="14" fill="#3fb950" class="l a3">al@oshawa:~$ <tspan fill="#e6f2ea">cat ./stack.txt</tspan></text>
  <text x="34" y="170" font-size="15" fill="#8be0a3" class="l a4">&gt; Python &#183; P4 &#183; Cisco &#183; PyTorch &#183; JS // from packets to policies to pixels</text>
  <text x="34" y="206" font-size="14" fill="#3fb950" class="l a5">al@oshawa:~$ <tspan fill="#e6f2ea">./ship --recent</tspan></text>
  <text x="34" y="230" font-size="15" fill="#8be0a3" class="l a6">&gt; [win] 1st @ Re;Animate '26 &#8212; a tactics game in AMOS BASIC on an Amiga</text>
  <text x="34" y="252" font-size="15" fill="#8be0a3" class="l a6">&gt; [ai]  RIDGE &#8212; one PPO agent, three personas, learning to survive Crafter</text>
  <text x="34" y="274" font-size="15" fill="#8be0a3" class="l a6">&gt; [dm]  a fully-local AI dungeon master that runs offline on Ollama</text>
  <text x="34" y="312" font-size="14" fill="#3fb950" class="l a7">al@oshawa:~$ <tspan fill="#e6f2ea">./focus --now</tspan></text>
  <text x="34" y="336" font-size="15" fill="#e3b341" class="l a7">&gt; [ teaching reward functions to play games ]</text>
  <rect x="34" y="348" width="210" height="12" rx="2" fill="#12241a" class="l a7"/>
  <rect x="34" y="348" height="12" rx="2" fill="#3fb950" class="pg"/>
  <text x="256" y="358" font-size="12" fill="#5c8f6d" class="l a7">62% &#8212; MSc CS @ Ontario Tech</text>
  <text x="34" y="390" font-size="15" fill="#3fb950">al@oshawa:~$ <tspan class="cur" fill="#3fb950">&#9608;</tspan></text>
  <rect x="1" y="1" width="898" height="418" rx="15" fill="url(#sl)"/>
</svg>
