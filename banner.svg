  </defs>
  <rect width="900" height="330" rx="14" fill="#f4f1ec"/>
  <rect x="0.5" y="0.5" width="899" height="329" rx="13.5" fill="none" stroke="#d9d4c8"/>
  <line x1="40" y1="58" x2="860" y2="58" stroke="#c4bfb1" stroke-width="1"/>
  <text x="40" y="42" class="mono" font-size="12" letter-spacing="3" fill="#7a766e">AL · 001</text>
  <text x="860" y="42" text-anchor="end" class="mono" font-size="12" letter-spacing="3" fill="#7a766e">OSHAWA, ON — CANADA</text>
  <text x="40" y="122" class="serif" font-size="58" fill="#1a1916">Al Muqshith Shifan</text>
  <text x="42" y="156" class="mono" font-size="14" letter-spacing="2" fill="#b14a2c">NETWORK ENGINEER BY TRADE · DEVELOPER BY PASSION</text>
  <text x="40" y="192" font-size="15" fill="#4a4843">MSc Computer Science @ Ontario Tech · Network Security, AI &amp; Full-Stack</text>
  <text x="40" y="215" font-size="15" fill="#4a4843">Bridging robust network infrastructure with creative software.</text>
  <line x1="40" y1="248" x2="860" y2="248" stroke="#d9d4c8" stroke-width="1"/>
  <text x="40" y="286" class="serif" font-size="34" fill="#1a1916">6+</text>
  <text x="40" y="308" class="mono" font-size="11" letter-spacing="2" fill="#7a766e">YRS IN TECH</text>
  <text x="180" y="286" class="serif" font-size="34" fill="#1a1916">15+</text>
  <text x="180" y="308" class="mono" font-size="11" letter-spacing="2" fill="#7a766e">PROJECTS SHIPPED</text>
  <text x="360" y="286" class="serif" font-size="34" fill="#1a1916">3.9<tspan font-size="20" fill="#7a766e">/4</tspan></text>
  <text x="360" y="308" class="mono" font-size="11" letter-spacing="2" fill="#7a766e">DEAN'S LIST '24</text>
  <text x="540" y="286" class="serif" font-size="34" fill="#b14a2c">CCNA</text>
  <text x="540" y="308" class="mono" font-size="11" letter-spacing="2" fill="#7a766e">CERTIFIED</text>
  <circle cx="700" cy="282" r="5" fill="#b14a2c"/>
  <text x="714" y="286" class="mono" font-size="12" letter-spacing="1" fill="#4a4843">Currently focusing</text>
</svg>
